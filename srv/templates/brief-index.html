<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI Friday &mdash; Daily Briefs</title>
  <meta name="description" content="Curated AI news, tools, and analysis for builders — updated daily by the AI Friday community in New Orleans.">
  <link rel="canonical" href="https://aifri.day/brief/">
  <link rel="alternate" type="application/rss+xml" title="AI Friday Daily Brief" href="https://aifri.day/feed.xml">
  <meta property="og:title" content="AI Friday — Daily Briefs">
  <meta property="og:description" content="Curated AI news, tools, and analysis for builders — updated daily by the AI Friday community in New Orleans.">
  <meta property="og:url" content="https://aifri.day/brief/">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://aifri.day/og-default.png">
  <meta property="og:site_name" content="AI Friday">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="AI Friday — Daily Briefs">
  <meta name="twitter:description" content="Curated AI news, tools, and analysis for builders — updated daily by the AI Friday community in New Orleans.">
  <meta name="twitter:image" content="https://aifri.day/og-default.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:wght@400;600;700&family=Instrument+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css?v=3">
  <link rel="icon" href="/favicon.ico" sizes="48x48">
  <link rel="icon" href="/icon-192.png" type="image/png" sizes="192x192">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <script defer src="https://umami-production-d337.up.railway.app/script.js" data-website-id="3a8001f6-6312-473a-b2bd-38dae609847c"></script>
  <script src="https://analytics.ahrefs.com/analytics.js" data-key="23HVW+pAWhX3mLQMX/nA5A" async></script>
</head>
<body>
  <div class="container">

    <nav class="nav">
      <a href="/" class="nav-logo">
        <span class="logo-ai">AI</span><span class="logo-friday">Friday</span>
        <span class="logo-location">New Orleans</span>
      </a>
    </nav>

    <section class="intro-section">
      <h1 class="page-title">Daily Briefs</h1>
      <p class="intro-text">Curated AI news and tools for builders. Updated daily.</p>
    </section>

    <div class="index-list">
      {{range .Briefs}}
      <a href="/brief/{{.DatePath}}/" class="index-item">
        <div class="index-date">{{.Short}}</div>
        <div class="index-body">
          <h3 class="index-heading">{{.Date}}</h3>
          <p class="index-preview">{{.Preview}}</p>
        </div>
      </a>
      {{end}}
    </div>

    <footer class="footer">
      <span class="footer-fleur">&#9884;&#65039;</span>
      New Orleans, LA
    </footer>

  </div>
</body>
</html>
